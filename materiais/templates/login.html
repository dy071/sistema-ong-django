<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device=width, initial-scale=1.0">
    <title>Login - SGED</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            font-weight: 700;
            margin-bottom: 25px;
            color: #1a1a1a;
            text-align: center;
        }

        .btn-login {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .bnt-login:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }

        .form-label {
            font-weight: 500;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 Login SGED</h1>
        <form method="post">
           {% csrf_token %} 

        <div class="mb-3">
            <label for="username" class="form-label">Usuário</label>
            <input type="text" name="username" class="form-control form-control-lg" id="username" placeholder="Seu usuário" required>
        </div>
        
         <div class="mb-4">
            <label for="password" class="form-label">Senha</label>
            <input type="password" name="password" class="form-control form-control-lg" id="password" placeholder="********" required>
        </div>
            
        <button type="submit" class="btn btn-primary bnt-login w-100 mb-3 shadow-sm">Entrar</button>
        
        <div class="text-center">
            <p class="text-muted small">Ainda não possui uma conta?<a href="{% url 'cadastro_usuario' %}" class="text-decoration-none">Cadastre-se aqui</a>.</p>
        </div>        
    </form>
    </div>
</body>
</html>
