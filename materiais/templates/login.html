{% extends 'materiais/base.html' %}

{% block conteudo %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 style="color: #2c3e50; font-weight: bold;">🔐 Login</h2>
                <p class="text-muted">Sistema de Gestão - ONG</p>
            </div>
            <form method="post">
                {% csrf_token %}

                <div class="mb-3 text-start">
                    <label for="username" class="form-label fw-bold text-secondary">👤 Usuário</label>
                    <input type="text" name="username" class="form-control form-control-lg" id="username" placeholder="Digite seu usuário" required>
                </div>
                
                <div class="mb-4 text-start">
                    <label for="password" class="form-label fw-bold text-secondary">🔑 Senha</label>
                    <input type="password" name="password" class="form-control form-control-lg" id="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fs-5" style="border-radius: 8px;">
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
