<!DOCTYPE html>
<html lang="pt-br">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<head>
    <meta charset="UTF-8">

    <title>Sistema de Gestão - ONG</title>
    <style>
        /* Cores e estilos para o site inteiro num lugar só! */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f9; }
        .navbar { background-color: #333; overflow: hidden; padding: 15px; }
        .navbar a { color: white; text-decoration: none; padding: 14px 20px; font-weight: bold; }
        .navbar a:hover { background-color: #ddd; color: black; border-radius: 4px; }
        .container { padding: 40px; }
        
        /* Estilos da tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        
        /* Estilos do formulário */
        .form-container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-bottom: 5px; font-weight: bold; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    {% if messages %}
        {% for message in messages %}
            <div style="padding: 10px; margin: 10px 0; border-radius: 5px;
                     {% if message.tags == 'success' %}
                         background-color: #d4edda; color: #155724;
                     {% elif message.tags == 'error' %}
                         background-color: #f8d7da; color: #721c24;
                     {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="navbar">
        <a href="{% url 'lista_materiais' %}">📦 Estoque</a>
        <a href="{% url 'cadastrar_material' %}">➕ Cadastrar Doações</a>
    </div>

    <div class="container">
        
        {% block conteudo %}
        {% endblock %}
        
    </div>

</body>
</html>
